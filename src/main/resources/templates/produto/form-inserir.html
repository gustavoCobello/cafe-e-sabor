<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${acao} + ' - Café Aroma & Sabor'">Cadastro de Produtos - Café Aroma & Sabor</title>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/cursor.css}">
</head>
<body>
    <header class="topbar">
        <a th:href="@{/home}" class="topbar-brand">
            <span class="brand-icon"><i class="ph ph-coffee"></i></span>
            <span>Café Aroma &amp; Sabor</span>
        </a>
        <div class="topbar-right">
            <div class="topbar-user">
                <span class="user-icon"><i class="ph ph-user"></i></span>
                <span sec:authentication="name">Usuário</span>
            </div>
            <form th:action="@{/logout}" method="POST" style="display:inline;">
                <button type="submit" class="btn-logout">Sair</button>
            </form>
        </div>
    </header>

    <main class="main-content">
        <div class="breadcrumb">
            <a th:href="@{/home}">Painel Principal</a> &gt;
            <a th:href="@{/produto}">Cadastro de Produtos</a> &gt;
            <span th:text="${acao}">Novo Produto</span>
        </div>

        <h1 class="page-title" th:text="${acao}">Novo Produto</h1>
        <p class="page-subtitle">Preencha os dados do produto abaixo.</p>

        <div class="form-card">
            <form th:action="${produto.id != null} ? @{/produto/atualizar/{id}(id=${produto.id})} : @{/produto/salvar}"
                  th:object="${produto}" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nome">Nome do Produto</label>
                        <input type="text" id="nome" th:field="*{nome}" placeholder="Ex.: Café Arábica Gourmet" required>
                        <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="error-message"></span>
                    </div>
                    <div class="form-group">
                        <label for="lote">Lote</label>
                        <input type="text" id="lote" th:field="*{lote}" placeholder="Ex.: LOTE-2026-001" required>
                        <span th:if="${#fields.hasErrors('lote')}" th:errors="*{lote}" class="error-message"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" th:field="*{descricao}" placeholder="Descrição do produto..."></textarea>
                </div>

                <div class="form-row-3">
                    <div class="form-group">
                        <label for="estoqueMinimo">Estoque Mínimo</label>
                        <input type="number" id="estoqueMinimo" th:field="*{estoqueMinimo}" placeholder="0" min="0" required>
                        <span th:if="${#fields.hasErrors('estoqueMinimo')}" th:errors="*{estoqueMinimo}" class="error-message"></span>
                    </div>
                    <div class="form-group">
                        <label for="quantidade">Quantidade Atual</label>
                        <input type="number" id="quantidade" th:field="*{quantidade}" placeholder="0" min="0" required>
                        <span th:if="${#fields.hasErrors('quantidade')}" th:errors="*{quantidade}" class="error-message"></span>
                    </div>
                    <div class="form-group">
                        <label for="validade">Data de Validade</label>
                        <input type="date" id="validade" th:field="*{validade}" required>
                        <span th:if="${#fields.hasErrors('validade')}" th:errors="*{validade}" class="error-message"></span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" th:text="${botaoSalvar}">Salvar Produto</button>
                    <a th:href="@{/produto}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <script th:src="@{/js/animacoes.js}"></script>
    <script th:src="@{/js/cursor.js}"></script>
</body>
</html>
