<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Café Aroma & Sabor</title>
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/cursor.css}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-logo">
            <div class="coffee-icon"><i class="ph ph-coffee"></i></div>
            <h1>Café Aroma & Sabor</h1>
            <span>Sistema de Gestão de Estoque</span>
        </div>

        <div class="login-error" id="loginError" th:if="${param.error}" th:text="Usuário ou senha inválidos." style="display: block;"></div>
        <div class="login-error" id="loginLogout" th:if="${param.logout}" th:text="Você saiu do sistema." style="display: block;"></div>

        <form th:action="@{/login}" method="POST" onsubmit="return validarLogin()">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" placeholder="Digite seu usuário" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="login-footer">
            Café Aroma &amp; Sabor &mdash; Controle de Estoque
        </div>
    </div>

    <script>
        function validarLogin() {
            var usuario = document.getElementById('username').value.trim();
            var senha = document.getElementById('password').value.trim();
            var errorDiv = document.getElementById('loginError');

            if (usuario === '' || senha === '') {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Preencha todos os campos.';
                return false;
            }

            return true;
        }
    </script>
    <script th:src="@{/js/animacoes.js}"></script>
    <script th:src="@{/js/cursor.js}"></script>
</body>
</html>
